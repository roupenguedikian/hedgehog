# ═══════════════════════════════════════════════════════════════════
# Aster venue config corrections based on official docs research
# Apply these changes to config/venues.yaml
# ═══════════════════════════════════════════════════════════════════
#
# CHANGES FROM CURRENT CONFIG:
#
# 1. maker_fee_bps: 2.0 → 1.0  (official: 0.01% = 1 bps)
# 2. taker_fee_bps: 5.0 → 3.5  (official: 0.035% = 3.5 bps)
# 3. Added: api_ws_url for combined streams
# 4. Added: auth_mode field to distinguish V1/V3
# 5. Added: chain_id for EIP-712 signing
# 6. Added: max_api_keys (30 per account)
# 7. Added: rate limits from docs
# 8. Added: listen_key_ttl_sec
# 9. Added: testnet URLs
# ═══════════════════════════════════════════════════════════════════

aster:
  name: Aster
  chain: bnb_chain
  chain_type: evm
  settlement_chain: bnb_chain
  funding_cycle_hours: 8

  # CORRECTED fees — from official docs:
  # https://docs.asterdex.com/product/aster-perpetuals/fees-and-specs/fees
  # "0.01% maker fee, 0.035% taker fee" (base rate, before VIP/ASTER discounts)
  maker_fee_bps: 1.0    # was 2.0 — official is 0.01%
  taker_fee_bps: 3.5    # was 5.0 — official is 0.035%

  max_leverage: 200       # Pro mode max; 1001x is a separate "Simple" product
  collateral_token: USDT
  api_base_url: https://fapi.asterdex.com
  ws_url: wss://fstream.asterdex.com/ws
  ws_combined_url: wss://fstream.asterdex.com/stream   # for multi-stream subscriptions
  deposit_chain: bnb
  tier: tier_2
  zero_gas: true            # off-chain matching, no gas for trades
  has_escape_hatch: false
  has_privacy: true          # hidden orders (V3 only, timeInForce='HIDDEN')
  has_anti_mev: true         # hidden orders = MEV-resistant
  yield_bearing_collateral: false
  symbol_format: "{symbol}USDT"

  # Auth config
  auth_modes:
    v1:
      description: "HMAC SHA256 — API key + secret"
      header: "X-MBX-APIKEY"
      signature: "HMAC-SHA256(secretKey, totalParams)"
      endpoint_prefix: "/fapi/v1"
    v3:
      description: "EIP-712 — wallet signing (3-address system)"
      chain_id: 1666
      domain_name: "AsterSignTransaction"
      domain_version: "1"
      endpoint_prefix: "/fapi/v3"
      nonce_unit: "microseconds"
      supports_hidden_orders: true

  # Rate limits (from /fapi/v1/exchangeInfo)
  rate_limits:
    request_weight_per_minute: 2400
    orders_per_minute: 1200
    ip_ban_escalation: "2min → 3days"

  # User data stream
  listen_key_ttl_sec: 3600      # 60 min
  listen_key_keepalive_sec: 1800 # recommended: 30 min

  # Testnet (for development/testing)
  testnet:
    api_base_url: https://www.asterdex-testnet.com
    ws_url: wss://fstream.asterdex-testnet.com/ws
    chain_id: 714   # testnet chain ID

  # Per-account limits
  max_api_keys: 30
  max_open_orders_per_symbol: 200
  max_algo_orders_per_symbol: 100

  # Normalized symbols where venue uses different naming
  symbol_overrides: {}
