services:
  bot:
    build: .
    container_name: hedgehog-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - hedgehog
    command: python main.py --mode OBSERVE_ONLY

  redis:
    image: redis:7-alpine
    container_name: hedgehog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hedgehog

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: aegis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aegis_dev}
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hedgehog


  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: hedgehog-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hedgehog-command.json
      GF_USERS_DEFAULT_THEME: dark
      GF_EXPLORE_ENABLED: "true"
      DB_PASSWORD: ${DB_PASSWORD:-aegis_dev}
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - timescaledb
    networks:
      - hedgehog

networks:
  hedgehog:
    driver: bridge

volumes:
  redis_data:
  pg_data:
  grafana_data:
