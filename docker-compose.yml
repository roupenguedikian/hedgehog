services:
  bot:
    build: .
    container_name: hedgehog-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - hedgehog
    command: python main.py --mode OBSERVE_ONLY

  redis:
    image: redis:7-alpine
    container_name: hedgehog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hedgehog

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: aegis-db
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aegis_dev}
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hedgehog

  grafana:
    image: grafana/grafana:latest
    container_name: hedgehog-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hedgehog.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - hedgehog

  prometheus:
    image: prom/prometheus:latest
    container_name: hedgehog-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - bot
    networks:
      - hedgehog

networks:
  hedgehog:
    driver: bridge

volumes:
  redis_data:
  pg_data:
  grafana_data:
  prometheus_data:
