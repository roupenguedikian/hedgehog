services:
  bot:
    build: .
    container_name: hedgehog-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - hedgehog
    command: python main.py --mode OBSERVE_ONLY

  redis:
    image: redis:7-alpine
    container_name: hedgehog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hedgehog

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: aegis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aegis_dev}
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hedgehog


  web:
    build: .
    container_name: hedgehog-web
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: timescaledb
    ports:
      - "8000:8000"
    volumes:
      - ./web:/app/web
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - timescaledb
    networks:
      - hedgehog
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000

networks:
  hedgehog:
    driver: bridge

volumes:
  redis_data:
  pg_data:
