apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: hedgehog-prometheus
    isDefault: true
    editable: true

  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: aegis
    user: aegis
    secureJsonData:
      password: ${DB_PASSWORD:-aegis_dev}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    editable: true
